<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 助教 · 智能对话</title>
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
    <!-- 左侧菜单栏 -->
    <aside class="sidebar">
        <div class="logo">🧠 AI 助教</div>
        <nav class="menu">
            <button class="menu-item active" data-page="chat">💬 问题解答</button>
            <button class="menu-item" data-page="user-center">👤 用户中心</button>
            <!-- 未来可加 -->
<!--            <button class="menu-item" data-page="voice">🎤 语音助手</button>-->
<!--            <button class="menu-item" data-page="reminders">⏰ 提醒事项</button>-->
        </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 聊天容器 -->
        <div class="chat-container" id="chatContainer">
            <!-- 消息会动态插入到这里 -->
        </div>

        <!-- 输入区域 -->
        <div id="inputArea" class="input-area">
            <div class="file-input">
                <div class="image-preview" id="imagePreview"></div>

                <label for="imageUpload" class="upload-btn">上传图片</label>
                <input type="file" id="imageUpload" accept="image/*" />
            </div>
            <textarea
                id="userInput"
                placeholder="输入你的问题，或上传图片后提问..."
            ></textarea>
            <button id="sendBtn">发送</button>
        </div>

        <!-- 用户中心页面 -->
        <div class="user-center-view" id="userCenterView" style="display: none;">
            <div id="authForm" style="display: none;">
                <div class="container" id="authContainer">
                    <!-- 登录面板 -->
                    <div class="sign-in-container">
                        <h3>用户登录</h3>
                        <input type="text" id="loginUsername" placeholder="用户名" />
                        <input type="password" id="loginPassword" placeholder="密码" />
                        <button id="loginBtn">登录</button>
                    </div>

                    <!-- 注册面板 -->
                    <div class="sign-up-container">
                        <h3>注册新账号</h3>
                        <input type="text" id="regUsername" placeholder="用户名（支持中英文、下划线）" />
                        <input type="password" id="regPassword" placeholder="密码（8-16位）" />
                        <button id="registerBtn">注册</button>
                    </div>

                    <!-- 遮罩层 -->
                    <div class="overlay-container">
                         <div class="overlay">
                             <div class="overlay-panel overlay-left">
                                 <h2>欢迎回来！</h2>
                                 <p>已有账号？点击切换到登录</p>
                                 <button class="ghost" id="signIn">登录</button>
                             </div>
                             <div class="overlay-panel overlay-right">
                                 <h2>你好，新朋友！</h2>
                                 <p>还没有账号？立即注册</p>
                                 <button class="ghost" id="signUp">注册</button>
                             </div>
                         </div>
                    </div>
                </div>
            </div>

            <!-- 用户信息展示 -->
            <div id="userInfoSection" class="user-info-split">
                <div class="solar-column">
                    <canvas id="solarCanvas" width="600" height="1200"></canvas>
                </div>

                <div class="profile-column">
                    <div class="profile-card-new">
                        <div class="avatar-section">
                            <div class="avatar-wrapper" onclick="document.getElementById('avatarInput').click()">
                                <img id="userAvatar" src="https://img.alicdn.com/imgextra/i4/O1CN01R6wlzD1IhhMlBcGLg_!!6000000000925-2-tps-800-800.png" alt="头像">
                                <div class="avatar-hint">更换头像</div>
                            </div>
                            <input type="file" id="avatarInput" hidden accept="image/*">
                            <h2 id="displayUsername">加载中...</h2>
                            <p class="reg-date">探索智能生活起源于：<span id="displayRegisteredAt">-</span></p>
                        </div>

                        <nav class="user-action-menu">
                            <button class="menu-btn" onclick="showChangePassword()">🔑 修改密码</button>
                            <button class="menu-btn" onclick="showAboutUs()">ℹ️ 关于我们</button>
                            <button id="logoutBtn" class="menu-btn logout-btn" onclick="handleLogout()">🚪 退出登录</button>
                        </nav>
                    </div>

                    <div id="aboutUsPanel" class="info-panel" style="display: none;">
                        <div class="panel-header">
                            <h3>关于 AI 助教</h3>
                            <button onclick="closeInfoPanel()">×</button>
                        </div>
                        <p>我们致力于通过视觉大模型技术提供具象化的解题指导。</p>
                    </div>

                    <div id="changePasswordPanel" class="info-panel" style="display: none;">
                        <div class="panel-header">
                            <h3>🔑 修改密码</h3>
                            <button onclick="closeChangePasswordPanel()">×</button>
                        </div>
                        <div class="auth-form-mini">
                            <input type="password" id="oldPassword" placeholder="输入旧密码" />
                            <input type="password" id="newPassword" placeholder="输入新密码 (8-16位)" />
                            <input type="password" id="confirmPassword" placeholder="确认新密码" />
                            <button class="menu-btn-item" style="margin-top: 10px; width: 100%;" onclick="submitChangePassword()">提交修改</button>
                        </div>
                    </div>

                </div>
            </div>
            <!-- 消息提示框 -->
            <div id="message" style="margin-top: 10px; color: red; min-height: 20px;"></div>
        </div>

        <div id="geometryPanel" class="feature-panel" style="display: none;">
            <div class="panel-header-float">
                <h3>📐 3D 几何解题助手</h3>
                <div class="tool-bar">
                    <!-- 绘制模式 -->
                    <button id="drawModeBtn" onclick="toggleDrawMode()" class="mini-btn" title="绘制辅助线 (D)">
                        <span>✏️ 画线</span>
                    </button>
                    <!-- 颜色选择器 -->
                    <div class="color-picker-wrap" title="选择辅助线颜色">
                        <label class="mini-btn color-btn" style="cursor:pointer;">
                            🎨
                            <input type="color" id="lineColorPicker" value="#ffff00" style="display:none;width:0;height:0;opacity:0;" oninput="updateDrawColor(this.value)">
                        </label>
                        <span id="colorPreview" class="color-dot" style="background:#ffff00;"></span>
                    </div>
                    <!-- 文字标注 -->
                    <button id="labelModeBtn" onclick="toggleLabelMode()" class="mini-btn" title="添加文字标注 (L)">
                        <span>🏷️ 标注</span>
                    </button>
                    <!-- 角度测量 -->
                    <button id="measureBtn" onclick="toggleMeasureMode()" class="mini-btn" title="测量两点距离 (M)">
                        <span>📏 测量</span>
                    </button>
                    <!-- 切换面渲染 -->
                    <button id="faceToggleBtn" onclick="toggleFaceRender()" class="mini-btn" title="显示/隐藏面 (F)">
                        <span>🔷 显面</span>
                    </button>
                    <!-- 坐标轴 -->
                    <button id="axisToggleBtn" onclick="toggleAxisHelper()" class="mini-btn active" title="显示/隐藏坐标轴 (A)">
                        <span>📊 坐标轴</span>
                    </button>
                    <!-- 重置视角 -->
                    <button onclick="resetCamera()" class="mini-btn" title="重置视角 (R)">
                        <span>🔄 复位</span>
                    </button>
                    <!-- 清除辅助线 -->
                    <button onclick="clearUserLines()" class="mini-btn clear-btn" title="清除辅助线 (C)">
                        <span>🗑️ 清除</span>
                    </button>
                </div>
                <button class="close-panel-btn" onclick="closeFeaturePanel('geometryPanel')" title="关闭">×</button>
            </div>
            <div id="threeJsContainer"></div>
            <!-- 状态提示条 -->
            <div id="geoStatusBar" class="geo-status-bar">
                旋转：左键拖动 &nbsp;|&nbsp; 缩放：滚轮 &nbsp;|&nbsp; 平移：右键拖动 &nbsp;|&nbsp; 快捷键：D=画线 L=标注 M=测量 F=显面 A=坐标轴 R=复位
            </div>
            <!-- AI 解析说明（可折叠） -->
            <div id="geometryExplanation" class="geo-explanation collapsed">
                <div class="geo-expl-header" onclick="toggleExplanation()">
                    <span>🤖 AI 分析</span>
                    <span id="explToggleIcon">▲ 展开</span>
                </div>
                <div id="explContent" class="geo-expl-content">
                    正在分析几何结构...
                </div>
            </div>
            <!-- 标注输入浮窗 -->
            <div id="labelInputBox" class="label-input-box" style="display:none;">
                <input id="labelInputText" type="text" placeholder="输入标注文字" maxlength="10"/>
                <button onclick="confirmLabel()">确定</button>
                <button onclick="cancelLabel()">取消</button>
            </div>
            <!-- 测量结果浮窗 -->
            <div id="measureResult" class="measure-result" style="display:none;"></div>
        </div>

        <div id="timelinePanel" class="feature-panel" style="display: none;">
            <div class="panel-header-float">
                <h3>⏳ 历史脉络时间轴</h3>
                <button onclick="closeFeaturePanel('timelinePanel')">×</button>
            </div>
            <div class="timeline-container" id="timelineContent">
                </div>
        </div>

    </main>

    <div id="imageModal" class="modal" style="display: none;">
        <span class="close-btn">&times;</span>
        <img class="modal-image" id="modalImage" src="" alt="放大查看">
    </div>

    <link rel="stylesheet" href="./css/katex.min.css">
    <script src="./js/katex.min.js"></script>
    <script src="./js/auto-render.min.js"></script>
    <script src="./js/marked.min.js"></script>
    <script src="./js/purify.min.js"></script>
    <script src="./js/three.min.js"></script>
    <script src="./js/OrbitControls.js"></script>
    <script src="./js/CSS2DRenderer.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
